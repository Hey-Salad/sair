<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sally Camera - Live Feed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 960px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 700; text-transform: uppercase; }
    .badge.live { background: #ef4444; color: #fff; animation: pulse 2s infinite; }
    .badge.offline { background: #333; color: #999; }
    .badge.ai { background: #8b5cf6; color: #fff; }
    .badge.edge { background: #f59e0b; color: #000; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .feed { position: relative; width: 100%; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
    .feed img { width: 100%; display: block; }
    .feed canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .feed .placeholder { display: flex; align-items: center; justify-content: center; aspect-ratio: 4/3; color: #555; font-size: 14px; }
    .overlay { position: absolute; top: 0; left: 0; right: 0; padding: 12px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); display: flex; justify-content: space-between; font-size: 12px; z-index: 2; }
    .overlay-bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 12px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); font-size: 11px; color: rgba(255,255,255,0.7); z-index: 2; display: flex; justify-content: space-between; }
    .stats { display: flex; gap: 16px; margin-top: 10px; font-size: 13px; color: #888; flex-wrap: wrap; }
    .stats span { display: flex; align-items: center; gap: 4px; }
    .stats .val { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }
    .controls { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { padding: 8px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    button:hover { background: #252525; border-color: #444; }
    button.primary { background: #ef4444; border-color: #ef4444; }
    button.primary:hover { background: #dc2626; }
    button.active { background: #16a34a; border-color: #16a34a; }
    button.ai { background: #7c3aed; border-color: #7c3aed; }
    button.ai:hover { background: #6d28d9; }
    button.ai-active { background: #8b5cf6; border-color: #8b5cf6; }
    .enhance-panel, .ai-panel { margin-top: 10px; padding: 12px; background: #111; border-radius: 8px; border: 1px solid #222; display: none; }
    .enhance-panel.open, .ai-panel.open { display: block; }
    .enhance-panel label { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .enhance-panel input[type=range] { width: 160px; accent-color: #ef4444; }
    .enhance-panel .val-display { width: 36px; text-align: right; font-variant-numeric: tabular-nums; color: #fff; font-weight: 600; font-size: 12px; }
    .presets { display: flex; gap: 6px; margin-bottom: 10px; }
    .presets button { padding: 4px 10px; font-size: 11px; }

    /* AI Vision */
    .ai-panel h3 { font-size: 13px; margin-bottom: 8px; color: #c4b5fd; }
    .ai-objects { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .ai-object-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 1px solid #312e81; }
    .ai-object-tag.browser { background: #1e1b4b; color: #c4b5fd; }
    .ai-object-tag.edge { background: #451a03; color: #fbbf24; border-color: #78350f; }
    .ai-object-tag .conf { margin-left: 4px; opacity: 0.7; }
    .ai-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .ai-status { font-size: 11px; color: #888; margin-top: 6px; }
    .ai-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #222; }
    .ai-section h4 { font-size: 12px; margin-bottom: 6px; }
    .ai-section h4.edge-title { color: #fbbf24; }
    .ai-section h4.browser-title { color: #c4b5fd; }

    .log { margin-top: 10px; padding: 10px; background: #111; border-radius: 8px; border: 1px solid #222; font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: #666; max-height: 100px; overflow-y: auto; }
    .log .entry { padding: 1px 0; }
    .log .entry.ok { color: #22c55e; }
    .log .entry.err { color: #ef4444; }
    .log .entry.ai { color: #8b5cf6; }
    .log .entry.edge { color: #f59e0b; }
    .res-badge { font-size: 10px; background: #222; padding: 2px 6px; border-radius: 4px; color: #888; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      Sally Camera
      <span id="badge" class="badge offline">Offline</span>
      <span id="aiBadge" class="badge" style="display:none"></span>
      <span id="edgeBadge" class="badge" style="display:none"></span>
      <span id="resBadge" class="res-badge"></span>
    </h1>

    <div class="feed" id="feedContainer">
      <img id="frame" style="display:none" alt="Live feed">
      <canvas id="bboxCanvas"></canvas>
      <div id="placeholder" class="placeholder">Tap Connect to start</div>
      <div class="overlay">
        <span id="deviceLabel" style="font-weight:600"></span>
        <span id="fpsLabel"></span>
      </div>
      <div class="overlay-bottom">
        <span id="resLabel"></span>
        <span id="sizeLabel"></span>
      </div>
    </div>

    <div class="stats">
      <span>Frames: <span class="val" id="frameCount">0</span></span>
      <span>FPS: <span class="val" id="fpsVal">0</span></span>
      <span>Data: <span class="val" id="dataVal">0 KB</span></span>
      <span>Avg frame: <span class="val" id="avgFrame">-</span></span>
    </div>

    <div class="controls">
      <button id="connectBtn" class="primary" onclick="toggleConn()">Connect</button>
      <button id="nightBtn" onclick="toggleNightVision()">Night Vision</button>
      <button id="aiBtn" class="ai" onclick="toggleAiPanel()">AI Vision</button>
      <button id="enhanceBtn" onclick="toggleEnhancePanel()">Enhance</button>
      <button onclick="takeSnapshot()">Snapshot</button>
      <button onclick="fullscreen()">Fullscreen</button>
    </div>

    <!-- AI Vision Panel -->
    <div class="ai-panel" id="aiPanel">
      <h3>Object Detection (DETR ResNet-50)</h3>

      <!-- Edge detection controls -->
      <div class="ai-section">
        <h4 class="edge-title">Edge Inference (from camera)</h4>
        <div class="ai-controls">
          <button id="edgeToggleBtn" style="background:#b45309;border-color:#b45309" onclick="toggleEdgeDetect()">Edge: ON</button>
          <select id="edgeInterval" onchange="updateEdgeInterval()">
            <option value="2000">Every 2s</option>
            <option value="5000" selected>Every 5s</option>
            <option value="10000">Every 10s</option>
            <option value="30000">Every 30s</option>
          </select>
          <span id="edgeStatus" style="font-size:11px;color:#888">Waiting for edge data...</span>
        </div>
      </div>

      <!-- Browser detection controls -->
      <div class="ai-section">
        <h4 class="browser-title">Browser Inference (on-demand)</h4>
        <div class="ai-controls">
          <button class="ai" onclick="detectOnce()">Detect Now</button>
          <button id="autoAiBtn" onclick="toggleAutoDetect()">Auto: OFF</button>
          <select id="aiInterval" onchange="updateAutoInterval()">
            <option value="2000">Every 2s</option>
            <option value="5000" selected>Every 5s</option>
            <option value="10000">Every 10s</option>
          </select>
          <label style="font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px">
            Min conf
            <input type="range" id="confThreshold" min="10" max="90" value="25" style="width:80px;accent-color:#8b5cf6" oninput="document.getElementById('confVal').textContent=this.value+'%'">
            <span id="confVal" style="color:#fff;font-weight:600;width:30px">25%</span>
          </label>
        </div>
        <div class="ai-status" id="aiStatus"></div>
      </div>

      <div class="ai-objects" id="aiObjects"></div>
    </div>

    <!-- Enhance Panel -->
    <div class="enhance-panel" id="enhancePanel">
      <div class="presets">
        <button onclick="applyPreset('none')">Original</button>
        <button onclick="applyPreset('bright')">Brighten</button>
        <button onclick="applyPreset('vivid')">Vivid</button>
        <button onclick="applyPreset('night')">Night Boost</button>
        <button onclick="applyPreset('sharp')">Sharpen</button>
      </div>
      <label>Brightness <span><input type="range" id="eBright" min="50" max="200" value="100" oninput="applyFilters()"><span class="val-display" id="eBrightVal">100</span></span></label>
      <label>Contrast <span><input type="range" id="eContrast" min="50" max="200" value="100" oninput="applyFilters()"><span class="val-display" id="eContrastVal">100</span></span></label>
      <label>Saturation <span><input type="range" id="eSat" min="0" max="200" value="100" oninput="applyFilters()"><span class="val-display" id="eSatVal">100</span></span></label>
      <label>Sharpness <span><input type="range" id="eSharp" min="0" max="5" value="0" step="0.5" oninput="applyFilters()"><span class="val-display" id="eSharpVal">0</span></span></label>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script>
    const WS_BASE = 'wss://sally-ai-camera-api.heysalad.app';
    const DETECT_URL = 'https://sally-api.heysalad.app/api/vision/detect';
    const params = new URLSearchParams(location.search);
    const deviceId = params.get('id') || 'ACA70429C3B4';

    let ws = null;
    let frameCount = 0;
    let totalBytes = 0;
    let fpsCount = 0;
    let prevUrl = null;
    let lastFrameBlob = null;

    // Detection state
    let browserDetections = [];  // from browser-initiated DETR calls
    let edgeDetections = [];     // from ESP32 edge inference
    let browserDetectTime = 0;
    let edgeDetectTime = 0;
    let autoDetectTimer = null;
    let detectCount = 0;
    let detecting = false;
    let edgeEnabled = true;
    let edgeCount = 0;

    // Smooth rendering state
    let renderBoxes = [];        // interpolated boxes for rendering
    let prevRenderBoxes = [];
    let renderAlpha = 1;
    let transitionStart = 0;
    const TRANSITION_MS = 400;   // smooth transition duration

    document.getElementById('deviceLabel').textContent = deviceId;

    // -- FPS counter --
    setInterval(() => {
      document.getElementById('fpsVal').textContent = fpsCount;
      document.getElementById('fpsLabel').textContent = fpsCount + ' fps';
      fpsCount = 0;
    }, 1000);

    function log(msg, type) {
      const el = document.getElementById('log');
      const d = document.createElement('div');
      d.className = 'entry' + (type ? ' ' + type : '');
      d.textContent = new Date().toLocaleTimeString() + ' ' + msg;
      el.appendChild(d);
      if (el.children.length > 50) el.removeChild(el.firstChild);
      el.scrollTop = el.scrollHeight;
    }

    // ── Connection ──
    function toggleConn() { if (ws) disconnect(); else connect(); }

    function connect() {
      const url = `${WS_BASE}/stream/${deviceId}?role=viewer`;
      log('Connecting to ' + deviceId + '...');
      ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        log('Connected!', 'ok');
        document.getElementById('badge').className = 'badge live';
        document.getElementById('badge').textContent = 'Live';
        document.getElementById('connectBtn').textContent = 'Disconnect';
        document.getElementById('connectBtn').classList.remove('primary');
      };

      ws.onmessage = (e) => {
        if (e.data instanceof ArrayBuffer) {
          const blob = new Blob([e.data], { type: 'image/jpeg' });
          lastFrameBlob = blob;
          const newUrl = URL.createObjectURL(blob);
          if (prevUrl) URL.revokeObjectURL(prevUrl);
          prevUrl = newUrl;

          const img = document.getElementById('frame');
          img.src = newUrl;
          img.style.display = 'block';
          document.getElementById('placeholder').style.display = 'none';

          frameCount++;
          fpsCount++;
          totalBytes += e.data.byteLength;

          document.getElementById('frameCount').textContent = frameCount;
          const mb = (totalBytes / (1024*1024)).toFixed(1);
          document.getElementById('dataVal').textContent = totalBytes > 1048576 ? mb + ' MB' : (totalBytes/1024).toFixed(0) + ' KB';
          document.getElementById('avgFrame').textContent = (totalBytes / frameCount / 1024).toFixed(1) + ' KB';
          document.getElementById('sizeLabel').textContent = (e.data.byteLength / 1024).toFixed(1) + ' KB/frame';

          img.onload = function() {
            const w = img.naturalWidth, h = img.naturalHeight;
            if (w && h) {
              document.getElementById('resLabel').textContent = w + 'x' + h;
              document.getElementById('resBadge').textContent = w + 'x' + h;
              // Sync canvas size
              const canvas = document.getElementById('bboxCanvas');
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;
            }
            img.onload = null;
          };
          return;
        }

        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'edge_detections') {
            handleEdgeDetections(msg);
          } else if (msg.type === 'error') {
            log('Server: ' + msg.message, 'err');
          } else if (msg.type === 'status') {
            // silent
          } else {
            log('Server: ' + JSON.stringify(msg));
          }
        } catch {}
      };

      ws.onclose = () => {
        log('Disconnected');
        document.getElementById('badge').className = 'badge offline';
        document.getElementById('badge').textContent = 'Offline';
        document.getElementById('connectBtn').textContent = 'Connect';
        document.getElementById('connectBtn').classList.add('primary');
        ws = null;
        stopAutoDetect();
      };

      ws.onerror = () => { log('WebSocket error', 'err'); };
    }

    function disconnect() { if (ws) { ws.close(); ws = null; } }

    // ── Night Vision ──
    let nightVision = false;
    function toggleNightVision() {
      if (!ws || ws.readyState !== WebSocket.OPEN) { log('Not connected', 'err'); return; }
      nightVision = !nightVision;
      ws.send(JSON.stringify({ type: 'night_vision', enabled: nightVision }));
      const btn = document.getElementById('nightBtn');
      btn.textContent = nightVision ? 'Night Vision: ON' : 'Night Vision';
      btn.className = nightVision ? 'active' : '';
      log('Night vision ' + (nightVision ? 'ON' : 'OFF'), 'ok');
    }

    // ── Edge Detection Control ──
    function handleEdgeDetections(msg) {
      const threshold = parseInt(document.getElementById('confThreshold').value) / 100;
      const filtered = (msg.detections || []).filter(d => d.score >= threshold);
      edgeDetections = filtered;
      edgeDetectTime = performance.now();
      edgeCount = msg.detection_id || (edgeCount + 1);

      document.getElementById('edgeBadge').style.display = 'inline';
      document.getElementById('edgeBadge').className = 'badge edge';
      document.getElementById('edgeBadge').textContent = filtered.length + ' edge';
      document.getElementById('edgeStatus').textContent =
        'Edge #' + edgeCount + ' | ' + filtered.length + ' objects';

      const labels = filtered.map(d => d.label).join(', ');
      log('Edge: ' + filtered.length + ' objects - ' + labels, 'edge');

      triggerTransition();
      updateObjectTags();
    }

    function toggleEdgeDetect() {
      if (!ws || ws.readyState !== WebSocket.OPEN) { log('Not connected', 'err'); return; }
      edgeEnabled = !edgeEnabled;
      ws.send(JSON.stringify({ type: 'edge_detect', enabled: edgeEnabled }));
      const btn = document.getElementById('edgeToggleBtn');
      btn.textContent = edgeEnabled ? 'Edge: ON' : 'Edge: OFF';
      btn.style.background = edgeEnabled ? '#b45309' : '#333';
      btn.style.borderColor = edgeEnabled ? '#b45309' : '#333';
      log('Edge detection ' + (edgeEnabled ? 'ON' : 'OFF'), 'edge');
    }

    function updateEdgeInterval() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const interval = parseInt(document.getElementById('edgeInterval').value);
      ws.send(JSON.stringify({ type: 'edge_detect', interval: interval }));
      log('Edge interval set to ' + (interval/1000) + 's', 'edge');
    }

    // ── Browser Detection (DETR via Workers AI) ──
    function toggleAiPanel() {
      const panel = document.getElementById('aiPanel');
      panel.classList.toggle('open');
      document.getElementById('aiBtn').className = panel.classList.contains('open') ? 'ai-active' : 'ai';
    }

    async function detectOnce() {
      if (detecting) return;
      if (!lastFrameBlob) { log('No frame available', 'err'); return; }

      detecting = true;
      document.getElementById('aiStatus').textContent = 'Detecting...';
      const start = performance.now();

      try {
        const res = await fetch(DETECT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'image/jpeg' },
          body: lastFrameBlob,
        });
        const json = await res.json();
        const elapsed = Math.round(performance.now() - start);

        if (json.ok) {
          const threshold = parseInt(document.getElementById('confThreshold').value) / 100;
          const filtered = (json.detections || []).filter(d => d.score >= threshold);
          detectCount++;
          browserDetections = filtered;
          browserDetectTime = performance.now();

          document.getElementById('aiBadge').style.display = 'inline';
          document.getElementById('aiBadge').className = 'badge ai';
          document.getElementById('aiBadge').textContent = filtered.length + ' browser';
          document.getElementById('aiStatus').textContent =
            'Browser #' + detectCount + ' | ' + filtered.length + ' objects | ' + elapsed + 'ms';

          const labels = filtered.map(d => d.label).join(', ');
          log('Browser: ' + filtered.length + ' objects (' + elapsed + 'ms) - ' + labels, 'ai');

          triggerTransition();
          updateObjectTags();
        } else {
          log('Detection error: ' + (json.error || 'unknown'), 'err');
          document.getElementById('aiStatus').textContent = 'Error: ' + (json.error || 'unknown');
        }
      } catch (err) {
        log('Detection failed: ' + err.message, 'err');
        document.getElementById('aiStatus').textContent = 'Request failed';
      }

      detecting = false;
    }

    function toggleAutoDetect() {
      if (autoDetectTimer) stopAutoDetect();
      else startAutoDetect();
    }

    function startAutoDetect() {
      if (!lastFrameBlob) { log('No frame available', 'err'); return; }
      const interval = parseInt(document.getElementById('aiInterval').value);
      detectOnce();
      autoDetectTimer = setInterval(() => {
        if (lastFrameBlob && !detecting) detectOnce();
        else if (!lastFrameBlob) stopAutoDetect();
      }, interval);
      document.getElementById('autoAiBtn').textContent = 'Auto: ON';
      document.getElementById('autoAiBtn').className = 'active';
      log('Auto-detect started every ' + (interval/1000) + 's', 'ai');
    }

    function stopAutoDetect() {
      if (autoDetectTimer) { clearInterval(autoDetectTimer); autoDetectTimer = null; }
      document.getElementById('autoAiBtn').textContent = 'Auto: OFF';
      document.getElementById('autoAiBtn').className = '';
    }

    function updateAutoInterval() {
      if (autoDetectTimer) { stopAutoDetect(); startAutoDetect(); }
    }

    // ── Object Tags Display ──
    function updateObjectTags() {
      const container = document.getElementById('aiObjects');
      container.innerHTML = '';

      edgeDetections.forEach(d => {
        const tag = document.createElement('span');
        tag.className = 'ai-object-tag edge';
        tag.innerHTML = d.label + '<span class="conf">' + Math.round(d.score * 100) + '%</span>';
        container.appendChild(tag);
      });

      browserDetections.forEach(d => {
        const tag = document.createElement('span');
        tag.className = 'ai-object-tag browser';
        tag.innerHTML = d.label + '<span class="conf">' + Math.round(d.score * 100) + '%</span>';
        container.appendChild(tag);
      });
    }

    // ── Smooth Canvas Bounding Box Rendering ──
    function triggerTransition() {
      // Merge edge + browser detections, preferring the most recent source
      prevRenderBoxes = renderBoxes.map(b => ({...b}));
      const merged = [];

      // Use whichever is more recent, or merge both
      const useEdge = edgeDetections.length > 0;
      const useBrowser = browserDetections.length > 0;

      if (useEdge) {
        edgeDetections.forEach(d => merged.push({
          label: d.label, score: d.score,
          xmin: d.box.xmin, ymin: d.box.ymin, xmax: d.box.xmax, ymax: d.box.ymax,
          source: 'edge', color: [245, 158, 11], // amber
        }));
      }
      if (useBrowser) {
        browserDetections.forEach(d => merged.push({
          label: d.label, score: d.score,
          xmin: d.box.xmin, ymin: d.box.ymin, xmax: d.box.xmax, ymax: d.box.ymax,
          source: 'browser', color: [139, 92, 246], // purple
        }));
      }

      // Match previous boxes to new ones for smooth interpolation
      renderBoxes = merged.map(newBox => {
        // Find closest previous box with same label
        let best = null, bestDist = Infinity;
        for (const prev of prevRenderBoxes) {
          if (prev.label !== newBox.label || prev.source !== newBox.source) continue;
          const dx = (prev.xmin + prev.xmax) / 2 - (newBox.xmin + newBox.xmax) / 2;
          const dy = (prev.ymin + prev.ymax) / 2 - (newBox.ymin + newBox.ymax) / 2;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < bestDist) { bestDist = dist; best = prev; }
        }
        return {
          ...newBox,
          // Store previous position for interpolation
          prevXmin: best ? best.xmin : newBox.xmin,
          prevYmin: best ? best.ymin : newBox.ymin,
          prevXmax: best ? best.xmax : newBox.xmax,
          prevYmax: best ? best.ymax : newBox.ymax,
          fadeIn: !best, // new box fades in
        };
      });

      transitionStart = performance.now();
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function drawBoundingBoxes() {
      const canvas = document.getElementById('bboxCanvas');
      const ctx = canvas.getContext('2d');
      const img = document.getElementById('frame');
      if (!img || !img.naturalWidth || canvas.width === 0) {
        requestAnimationFrame(drawBoundingBoxes);
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (renderBoxes.length === 0) {
        requestAnimationFrame(drawBoundingBoxes);
        return;
      }

      const now = performance.now();
      const elapsed = now - transitionStart;
      const rawT = Math.min(elapsed / TRANSITION_MS, 1);
      const t = easeOutCubic(rawT);

      const w = canvas.width;
      const h = canvas.height;

      for (const box of renderBoxes) {
        // Interpolate position
        const x1 = lerp(box.prevXmin, box.xmin, t);
        const y1 = lerp(box.prevYmin, box.ymin, t);
        const x2 = lerp(box.prevXmax, box.xmax, t);
        const y2 = lerp(box.prevYmax, box.ymax, t);

        // Fade in for new boxes
        const alpha = box.fadeIn ? t : 1;
        const [r, g, b] = box.color;

        // Draw box
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.9})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

        // Draw subtle fill
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.08})`;
        ctx.fillRect(x1, y1, x2 - x1, y2 - y1);

        // Draw label background
        const label = box.label + ' ' + Math.round(box.score * 100) + '%';
        const sourceTag = box.source === 'edge' ? ' [E]' : ' [B]';
        const text = label + sourceTag;
        ctx.font = 'bold 11px -apple-system, sans-serif';
        const metrics = ctx.measureText(text);
        const labelW = metrics.width + 8;
        const labelH = 16;
        const labelY = y1 - labelH - 2;

        ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.9})`;
        ctx.beginPath();
        ctx.roundRect(x1, Math.max(0, labelY), labelW, labelH, 3);
        ctx.fill();

        // Draw label text
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillText(text, x1 + 4, Math.max(0, labelY) + 12);

        // Draw corner accents
        const cornerLen = Math.min(12, (x2 - x1) * 0.2, (y2 - y1) * 0.2);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.lineWidth = 3;
        // Top-left
        ctx.beginPath(); ctx.moveTo(x1, y1 + cornerLen); ctx.lineTo(x1, y1); ctx.lineTo(x1 + cornerLen, y1); ctx.stroke();
        // Top-right
        ctx.beginPath(); ctx.moveTo(x2 - cornerLen, y1); ctx.lineTo(x2, y1); ctx.lineTo(x2, y1 + cornerLen); ctx.stroke();
        // Bottom-left
        ctx.beginPath(); ctx.moveTo(x1, y2 - cornerLen); ctx.lineTo(x1, y2); ctx.lineTo(x1 + cornerLen, y2); ctx.stroke();
        // Bottom-right
        ctx.beginPath(); ctx.moveTo(x2 - cornerLen, y2); ctx.lineTo(x2, y2); ctx.lineTo(x2, y2 - cornerLen); ctx.stroke();
      }

      requestAnimationFrame(drawBoundingBoxes);
    }

    // Start render loop
    requestAnimationFrame(drawBoundingBoxes);

    // ── Enhance Panel ──
    function toggleEnhancePanel() {
      const panel = document.getElementById('enhancePanel');
      panel.classList.toggle('open');
      document.getElementById('enhanceBtn').className = panel.classList.contains('open') ? 'active' : '';
    }

    function applyFilters() {
      const b = document.getElementById('eBright').value;
      const c = document.getElementById('eContrast').value;
      const s = document.getElementById('eSat').value;
      const sh = document.getElementById('eSharp').value;
      document.getElementById('eBrightVal').textContent = b;
      document.getElementById('eContrastVal').textContent = c;
      document.getElementById('eSatVal').textContent = s;
      document.getElementById('eSharpVal').textContent = sh;
      const img = document.getElementById('frame');
      const filters = [`brightness(${b/100})`, `contrast(${c/100})`, `saturate(${s/100})`];
      img.style.filter = filters.join(' ');
      if (parseFloat(sh) > 0) {
        updateSharpenFilter(parseFloat(sh));
        img.style.filter += ' url(#sharpen)';
      }
    }

    function updateSharpenFilter(amount) {
      let svg = document.getElementById('sharpenSvg');
      if (!svg) {
        svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.id = 'sharpenSvg'; svg.setAttribute('width','0'); svg.setAttribute('height','0');
        svg.style.position = 'absolute'; document.body.appendChild(svg);
      }
      const neg = -amount, center = 1 + 4 * amount;
      svg.innerHTML = `<filter id="sharpen"><feConvolveMatrix order="3" kernelMatrix="0 ${neg} 0 ${neg} ${center} ${neg} 0 ${neg} 0"/></filter>`;
    }

    function applyPreset(name) {
      const presets = {
        none: {b:100,c:100,s:100,sh:0}, bright: {b:140,c:110,s:110,sh:0},
        vivid: {b:110,c:130,s:150,sh:0.5}, night: {b:180,c:130,s:80,sh:1}, sharp: {b:105,c:115,s:105,sh:2},
      };
      const p = presets[name] || presets.none;
      document.getElementById('eBright').value=p.b; document.getElementById('eContrast').value=p.c;
      document.getElementById('eSat').value=p.s; document.getElementById('eSharp').value=p.sh;
      applyFilters(); log('Preset: '+name, 'ok');
    }

    // ── Snapshot & Fullscreen ──
    function takeSnapshot() {
      const img = document.getElementById('frame');
      if (!img.src) return;
      const a = document.createElement('a'); a.href = img.src;
      a.download = `sally-${deviceId}-${Date.now()}.jpg`; a.click();
    }

    function fullscreen() {
      const el = document.querySelector('.feed');
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    // ── Cleanup stale detections ──
    setInterval(() => {
      const now = performance.now();
      // Clear edge detections after 15s of no update
      if (edgeDetections.length > 0 && now - edgeDetectTime > 15000) {
        edgeDetections = [];
        triggerTransition();
        updateObjectTags();
        document.getElementById('edgeBadge').style.display = 'none';
      }
      // Clear browser detections after 15s
      if (browserDetections.length > 0 && now - browserDetectTime > 15000) {
        browserDetections = [];
        triggerTransition();
        updateObjectTags();
        document.getElementById('aiBadge').style.display = 'none';
      }
    }, 2000);

    // Auto-connect
    connect();
  </script>
</body>
</html>
